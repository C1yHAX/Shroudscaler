<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" role="img" aria-label="Shroudscaler banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1222"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
    <radialGradient id="fogP" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#7b6cff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7b6cff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="fogT" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#21d4b4" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#21d4b4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c9bcff"/>
      <stop offset="0.5" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#7ef0db"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7b6cff"/>
      <stop offset="1" stop-color="#21d4b4"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="300" rx="16" fill="url(#bg)"/>

  <!-- left side: the Shroud (soft fog) -->
  <circle cx="150" cy="110" r="160" fill="url(#fogP)"/>
  <circle cx="70"  cy="210" r="120" fill="url(#fogT)"/>
  <circle cx="250" cy="220" r="110" fill="url(#fogP)"/>

  <!-- right side: clarity / upscaling — a crisp pixel grid resolving into sharp bars -->
  <g fill="#7ef0db">
    <rect x="980"  y="96"  width="14" height="14" rx="2" opacity="0.20"/>
    <rect x="1004" y="96"  width="14" height="14" rx="2" opacity="0.35"/>
    <rect x="1028" y="96"  width="14" height="14" rx="2" opacity="0.55"/>
    <rect x="1052" y="96"  width="14" height="14" rx="2" opacity="0.80"/>
    <rect x="980"  y="120" width="14" height="14" rx="2" opacity="0.30"/>
    <rect x="1004" y="120" width="14" height="14" rx="2" opacity="0.50"/>
    <rect x="1028" y="120" width="14" height="14" rx="2" opacity="0.70"/>
    <rect x="1052" y="120" width="14" height="14" rx="2" opacity="0.95"/>
    <rect x="980"  y="144" width="14" height="14" rx="2" opacity="0.20"/>
    <rect x="1004" y="144" width="14" height="14" rx="2" opacity="0.35"/>
    <rect x="1028" y="144" width="14" height="14" rx="2" opacity="0.55"/>
    <rect x="1052" y="144" width="14" height="14" rx="2" opacity="0.80"/>
  </g>
  <g fill="#7b6cff" opacity="0.7">
    <rect x="1086" y="92"  width="6" height="118" rx="3"/>
    <rect x="1100" y="100" width="6" height="102" rx="3" opacity="0.7"/>
    <rect x="1114" y="110" width="6" height="82"  rx="3" opacity="0.5"/>
  </g>

  <!-- wordmark -->
  <text x="600" y="150" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="84" font-weight="800" letter-spacing="3" fill="url(#title)">SHROUDSCALER</text>
  <text x="600" y="196" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="23" letter-spacing="1.5" fill="#9aa4b2">Shroudtopia&#160;&#43;&#160;OptiScaler&#160;&#8212;&#160;one winmm.dll for Enshrouded</text>

  <rect x="455" y="220" width="290" height="4" rx="2" fill="url(#accent)"/>
</svg>
